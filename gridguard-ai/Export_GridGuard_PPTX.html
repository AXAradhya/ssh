<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- We use the PptxGenJS CDN to entirely avoid python/npm install errors -->

    <style>
        body {
            background: #050814;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: #00d4ff;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #00d4ff;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        button {
            background-color: #00d4ff;
            color: #050814;
            font-weight: bold;
            cursor: pointer;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            margin-top: 20px;
            display: none;
            /* Shown after load */
        }

        button:hover {
            background-color: #ffffff;
        }

        #status {
            color: #aaaaaa;
        }
    </style>
</head>

<body>
